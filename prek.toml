# prek config — fast pre-commit hooks for efi-cli
# Install: prek install
# Run manually: prek run

# Built-in hooks (Rust native, zero setup)
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
]

# Go-specific hooks
[[repos]]
repo = "local"
hooks = [
  { id = "go-fmt", name = "go fmt", language = "system", entry = "gofmt -w", types = ["go"] },
  { id = "go-vet", name = "go vet", language = "system", entry = "go vet ./...", types = ["go"], pass_filenames = false, require_serial = true },
  { id = "go-build", name = "go build", language = "system", entry = "go build ./...", types = ["go"], pass_filenames = false, require_serial = true },
]
